name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - staging
      - claude/**
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run linting (ESLint)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build --if-present

      - name: Validate wrangler.toml
        run: |
          npm install -g wrangler
          wrangler deploy --dry-run --outdir dist

      - name: Check schema.sql syntax
        run: |
          if [ -f "schema.sql" ]; then
            echo "✓ schema.sql exists"
            # Basic syntax check
            grep -q "CREATE TABLE" schema.sql && echo "✓ Contains CREATE TABLE statements"
          fi

  migrate-check:
    name: Migration Check
    runs-on: ubuntu-latest
    needs: build-check
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check migration files
        run: |
          if [ -f "schema.sql" ]; then
            echo "✓ schema.sql found"
            echo "Migration will run automatically on deployment"
          else
            echo "⚠ No schema.sql found"
          fi

      - name: Comment PR with migration status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let message = '### 🗄️ Database Migration Check\n\n';

            if (fs.existsSync('schema.sql')) {
              message += '✅ Migration file found: `schema.sql`\n';
              message += '✅ Migrations will run automatically on deployment\n\n';
              message += '**Note**: Review schema changes carefully before merging.\n';
            } else {
              message += '⚠️ No migration file found\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            })

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-check]
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Run Database Migrations (Automatic)
        run: |
          echo "🗄️ Running database migrations for staging..."
          if [ -f "schema.sql" ]; then
            wrangler d1 execute saveto-db-staging --env staging --file=./schema.sql --yes
            echo "✅ Migrations completed"
          else
            echo "⚠️ No schema.sql found, skipping migrations"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Workers to Staging
        id: deploy-workers
        run: |
          echo "🚀 Deploying to Cloudflare Workers (Staging)..."
          DEPLOY_OUTPUT=$(wrangler deploy --env staging 2>&1)
          echo "$DEPLOY_OUTPUT"

          # Extract URLs from output
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://.*workers.dev' | head -1 || echo "")
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Pages to Staging
        id: deploy-pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: saveto
          directory: public
          branch: staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR with deployment URLs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const workerUrl = '${{ steps.deploy-workers.outputs.worker_url }}' || 'Check Cloudflare Dashboard';
            const pagesUrl = '${{ steps.deploy-pages.outputs.url }}' || 'Check Cloudflare Dashboard';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🚀 Deployed to Staging!\n\n' +
                    '### Deployment URLs:\n' +
                    `- **Workers**: ${workerUrl}\n` +
                    `- **Pages**: ${pagesUrl}\n\n` +
                    '### Next Steps:\n' +
                    '1. ✅ Test the staging deployment\n' +
                    '2. ✅ Verify all features work correctly\n' +
                    '3. ✅ Approve for production deployment\n\n' +
                    '---\n' +
                    `*Deployed from commit: ${context.sha.substring(0, 7)}*`
            })

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-check]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Run Database Migrations (Automatic)
        run: |
          echo "🗄️ Running database migrations for production..."
          if [ -f "schema.sql" ]; then
            wrangler d1 execute saveto-db-production --env production --file=./schema.sql --yes
            echo "✅ Migrations completed"
          else
            echo "⚠️ No schema.sql found, skipping migrations"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Workers to Production
        id: deploy-workers-prod
        run: |
          echo "🚀 Deploying to Cloudflare Workers (Production)..."
          DEPLOY_OUTPUT=$(wrangler deploy --env production 2>&1)
          echo "$DEPLOY_OUTPUT"

          # Extract URLs from output
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://.*workers.dev' | head -1 || echo "")
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Pages to Production
        id: deploy-pages-prod
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: saveto
          directory: public
          branch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Production Deployment

            ### Deployed URLs:
            - **Workers**: ${{ steps.deploy-workers-prod.outputs.worker_url || 'Check Cloudflare Dashboard' }}
            - **Pages**: ${{ steps.deploy-pages-prod.outputs.url || 'Check Cloudflare Dashboard' }}

            ### Changes:
            ${{ github.event.head_commit.message }}

            ---
            *Deployed at: ${{ github.event.head_commit.timestamp }}*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Deployment
        if: always()
        run: |
          echo "Production deployment completed!"
          echo "Status: ${{ job.status }}"

  cleanup:
    name: Cleanup Old Deployments
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [deploy-production]
    steps:
      - name: Cleanup old Workers deployments
        run: |
          echo "Cleaning up old deployments..."
          # Add cleanup logic if needed
