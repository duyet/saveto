name = "saveto"
main = "src/worker.js"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]


# Account ID (replace with your Cloudflare account ID)
# Find at: https://dash.cloudflare.com/?to=/:account/workers
account_id = "YOUR_ACCOUNT_ID"

# Workers configuration
workers_dev = true

# Build configuration
[build]
command = "npm run build:worker"

# D1 Database bindings (for all data including sessions)
[[d1_databases]]
binding = "DB"                                       # Available in your Worker as env.DB
database_name = "saveto-db"
database_id = "7d58007a-d2ae-4fc9-a46c-867091827b8d" # Created with: wrangler d1 create saveto-db

# Optional: KV namespace for cache only (if needed for high-performance caching)
[[kv_namespaces]]
binding = "CACHE"                       # Available in your Worker as env.CACHE
id = "4830eec670ed4328bddf5aa751cfba2a"
preview_id = ""

# Static asset serving (if using Workers to serve assets)
[site]
bucket = "./public"

# R2 bucket for user uploads (optional)
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "saveto-uploads"

# Durable Objects for real-time features (optional)
# [[durable_objects.bindings]]
# name = "ROOM"
# class_name = "Room"
# script_name = "saveto"

# Rate limiting
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Observability
[observability]
enabled = true
